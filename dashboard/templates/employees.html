<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עובדים - מכולת דשבורד</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Blue accent for employees */
        .employee-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .employee-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 100%);
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .employee-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .employee-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(59,130,246,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .employee-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .field-row {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(241,245,249,0.55);
            font-weight: 600;
        }

        .field-input {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            color: var(--text-light);
            font-size: 0.95rem;
            font-family: inherit;
            direction: ltr;
            text-align: left;
            width: 100%;
            transition: border-color 0.15s;
        }

        .field-input:focus {
            outline: none;
            border-color: #93c5fd;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .btn-save-card {
            flex: 1;
            padding: 0.6rem;
            background: rgba(59,130,246,0.25);
            border: 1px solid rgba(59,130,246,0.45);
            border-radius: 8px;
            color: #93c5fd;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save-card:hover { background: rgba(59,130,246,0.4); }
        .btn-save-card:disabled { opacity: 0.5; cursor: default; }

        .finalized-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            background: rgba(34,197,94,0.2);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.3);
            white-space: nowrap;
        }

        .unfinalized-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            background: rgba(250,204,21,0.15);
            color: #fde68a;
            border: 1px solid rgba(250,204,21,0.3);
            white-space: nowrap;
        }

        .save-msg {
            font-size: 0.78rem;
            color: #86efac;
            text-align: center;
            min-height: 1.1rem;
        }

        /* Summary KPI */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .employee-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">
        <span class="store-name">🏪 מכולת</span>
        <span class="page-title">עובדים</span>
    </div>
    <nav>
        <ul class="navbar-nav">
            <li><a href="/">בית</a></li>
            <li><a href="/fixed-expenses">הוצאות קבועות</a></li>
            <li><a href="/employees" class="active">עובדים</a></li>
        </ul>
    </nav>
    <div class="navbar-end">
        <span id="current-month" class="navbar-meta"></span>
        <span class="navbar-user">
            {{ current_user.username }}
            {% if current_user.is_admin %}
            <span class="role-badge admin">מנהל</span>
            {% else %}
            <span class="role-badge viewer">צופה</span>
            {% endif %}
        </span>
        <a href="{{ url_for('logout') }}" class="btn-logout">יציאה</a>
    </div>
</nav>

<main class="main-content">

    <!-- Summary KPIs -->
    <section class="summary-bar" id="kpi-section">
        <div class="loading">
            <div class="spinner"></div>
            <span>טוען...</span>
        </div>
    </section>

    <!-- Employee Cards -->
    <section>
        <h2 class="section-title">👷 עובדים פעילים – <span id="month-label"></span></h2>
        <div class="employee-cards" id="employee-cards">
            <div class="loading">
                <div class="spinner"></div>
                <span>טוען עובדים...</span>
            </div>
        </div>
    </section>

</main>

<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
'use strict';

const monthStr = new Date().toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
document.getElementById('current-month').textContent = monthStr;
document.getElementById('month-label').textContent   = monthStr;

// ── Load ───────────────────────────────────────────────────────
async function loadEmployees() {
    const kpi     = document.getElementById('kpi-section');
    const cardsEl = document.getElementById('employee-cards');
    try {
        const res = await fetch('/api/employees');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const employees = await res.json();
        renderKpis(kpi, employees);
        renderCards(cardsEl, employees);
    } catch (err) {
        console.error(err);
        kpi.innerHTML     = '<p class="error-msg">שגיאה בטעינת נתונים.</p>';
        cardsEl.innerHTML = '<p class="error-msg">שגיאה בטעינת נתונים.</p>';
    }
}

function renderKpis(section, employees) {
    const totalSalary = employees.reduce((s, e) => {
        if (e.hours_worked != null) return s + e.hours_worked * e.hourly_rate;
        return s;
    }, 0);
    const finalized = employees.filter(e => e.is_finalized).length;

    section.innerHTML = `
        <div class="kpi-card kpi-card--salary">
            <div class="kpi-header">
                <span class="kpi-icon">👷</span>
                <span class="kpi-label">עלות שכר חודשית</span>
            </div>
            <span class="kpi-value salary">${formatMoney(totalSalary)}</span>
        </div>
        <div class="kpi-card kpi-card--salary">
            <div class="kpi-header">
                <span class="kpi-icon">✅</span>
                <span class="kpi-label">עובדים עם שעות סופיות</span>
            </div>
            <span class="kpi-value salary">${finalized} / ${employees.length}</span>
        </div>
    `;
}

function renderCards(container, employees) {
    if (!employees.length) {
        container.innerHTML = '<p style="color:var(--text-muted);padding:2rem;text-align:center">אין עובדים פעילים</p>';
        return;
    }
    container.innerHTML = employees.map(e => {
        const badge = e.is_finalized
            ? '<span class="finalized-badge">סופי ✓</span>'
            : '<span class="unfinalized-badge">טרם הוזן</span>';
        return `
        <div class="employee-card" id="card-${e.id}">
            <div class="employee-card-header">
                <div class="employee-avatar">👤</div>
                <div>
                    <div class="employee-name">${e.name}</div>
                </div>
            </div>

            <div class="field-row">
                <span class="field-label">תעריף לשעה (₪)</span>
                <input
                    class="field-input"
                    id="rate-${e.id}"
                    type="number"
                    min="0"
                    step="0.5"
                    value="${e.hourly_rate}"
                    placeholder="תעריף לשעה"
                >
            </div>

            <div class="field-row">
                <span class="field-label">שעות חודש זה</span>
                <input
                    class="field-input"
                    id="hours-${e.id}"
                    type="number"
                    min="0"
                    step="0.25"
                    value="${e.hours_worked != null ? e.hours_worked : ''}"
                    placeholder="הזן שעות עבודה"
                >
            </div>

            <div class="card-footer">
                <button class="btn-save-card" id="save-btn-${e.id}" onclick="saveEmployee(${e.id})">
                    שמור
                </button>
                <span id="badge-${e.id}">${badge}</span>
            </div>
            <div class="save-msg" id="msg-${e.id}"></div>
        </div>
        `;
    }).join('');
}

// ── Save employee ──────────────────────────────────────────────
async function saveEmployee(id) {
    const btn        = document.getElementById(`save-btn-${id}`);
    const rateInput  = document.getElementById(`rate-${id}`);
    const hoursInput = document.getElementById(`hours-${id}`);
    const msgEl      = document.getElementById(`msg-${id}`);
    const badgeEl    = document.getElementById(`badge-${id}`);

    const hourly_rate  = parseFloat(rateInput.value);
    const hours_worked = hoursInput.value !== '' ? parseFloat(hoursInput.value) : null;

    if (isNaN(hourly_rate) || hourly_rate < 0) {
        rateInput.focus();
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'שומר...';
    msgEl.textContent = '';

    try {
        const body = { hourly_rate };
        if (hours_worked !== null && !isNaN(hours_worked)) {
            body.hours_worked = hours_worked;
        }

        const res = await fetch(`/api/employees/${id}`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        // Update badge if hours were saved
        if (body.hours_worked != null) {
            badgeEl.innerHTML = '<span class="finalized-badge">סופי ✓</span>';
        }

        msgEl.textContent = 'נשמר בהצלחה ✓';
        setTimeout(() => { msgEl.textContent = ''; }, 3000);
    } catch (err) {
        console.error(err);
        msgEl.textContent = 'שגיאה בשמירה';
        msgEl.style.color = '#fca5a5';
    } finally {
        btn.disabled    = false;
        btn.textContent = 'שמור';
    }
}

// ── Boot ───────────────────────────────────────────────────────
loadEmployees();
</script>
</body>
</html>
