<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הוצאות קבועות - מכולת דשבורד</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page-accent { color: #818cf8; }

        .table-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .table-header h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .data-table thead th { background: #162032; }

        /* ── Add form panel ── */
        .add-panel {
            background: #162032;
            border-bottom: 1px solid var(--card-border);
            padding: 1rem 1.5rem;
            display: none;
            gap: 0.75rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .add-panel.open { display: flex; }

        .add-panel .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
            min-width: 140px;
        }

        .add-panel label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .add-panel input {
            background: var(--bg);
            border: 1px solid #818cf8;
            border-radius: 6px;
            padding: 0.45rem 0.65rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .add-panel input:focus { outline: none; border-color: #a5b4fc; }

        .add-panel .panel-actions { display: flex; gap: 0.5rem; padding-bottom: 0.05rem; }

        /* ── Buttons ── */
        .btn-add-main {
            font-size: 0.82rem;
            font-weight: 700;
            padding: 0.4rem 0.85rem;
            background: rgba(129,140,248,0.15);
            border: 1px solid rgba(129,140,248,0.45);
            border-radius: 6px;
            color: #c7d2fe;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .btn-add-main:hover { background: rgba(129,140,248,0.28); }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.25rem 0.4rem;
            border-radius: 4px;
            transition: background 0.15s;
            color: var(--text-secondary);
        }
        .btn-icon:hover { background: rgba(255,255,255,0.06); }

        .btn-icon.delete:hover { background: rgba(239,68,68,0.15); }

        .btn-save-inline {
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.3rem 0.65rem;
            background: rgba(129,140,248,0.15);
            border: 1px solid rgba(129,140,248,0.4);
            border-radius: 6px;
            color: #c7d2fe;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-save-inline:hover { background: rgba(129,140,248,0.28); }

        .btn-cancel-inline {
            font-size: 0.78rem;
            padding: 0.3rem 0.5rem;
            background: none;
            border: 1px solid #334155;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
        }
        .btn-cancel-inline:hover { background: rgba(255,255,255,0.04); }

        /* ── Amount inline edit ── */
        .amount-input {
            width: 110px;
            background: var(--bg);
            border: 1px solid #818cf8;
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            text-align: left;
            direction: ltr;
        }
        .amount-input:focus { outline: none; border-color: #a5b4fc; }

        .actions-cell { display: flex; gap: 0.35rem; align-items: center; white-space: nowrap; }

        .saved-flash {
            font-size: 0.75rem;
            color: #86efac;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* ── Electricity special row ── */
        .elec-row td { background: rgba(251,191,36,0.06) !important; }
        .elec-row:hover td { background: rgba(251,191,36,0.12) !important; }
        .elec-label { color: #fbbf24; font-weight: 600; }
        .btn-history {
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.28rem 0.65rem;
            background: rgba(251,191,36,0.12);
            border: 1px solid rgba(251,191,36,0.35);
            border-radius: 6px;
            color: #fbbf24;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .btn-history:hover { background: rgba(251,191,36,0.24); }

        /* ── tfoot ── */
        tfoot td {
            font-weight: 700;
            color: #c7d2fe;
            background: #1a1d35 !important;
            border-top: 2px solid rgba(129,140,248,0.3) !important;
            padding: 0.8rem 0.75rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand" style="text-decoration:none; display:flex; align-items:center;">
        <img src="{{ url_for('static', filename='makolet_logo.jpg') }}"
             alt="מכולת"
             style="height:36px; width:auto; object-fit:contain;">
    </a>
    <nav>
        <ul class="navbar-nav">
            <li><a href="/">בית</a></li>
            <li class="nav-dropdown">
                <a href="/fixed-expenses" class="dropdown-toggle active">הוצאות קבועות ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="/fixed-expenses" class="active">הוצאות קבועות</a></li>
                    <li><a href="/electricity-history" style="color:#fbbf24">היסטוריית חשמל ⚡</a></li>
                </ul>
            </li>
            <li><a href="/employees">עובדים</a></li>
        </ul>
    </nav>
    <div class="navbar-end">
        <span id="current-month" class="navbar-meta"></span>
        <span class="navbar-user">
            {{ current_user.username }}
            {% if current_user.is_admin %}
            <span class="role-badge admin">מנהל</span>
            {% else %}
            <span class="role-badge viewer">צופה</span>
            {% endif %}
        </span>
        <a href="{{ url_for('logout') }}" class="btn-logout">יציאה</a>
    </div>
</nav>

<main class="main-content">

    <!-- KPI -->
    <section class="cards-grid" id="kpi-section">
        <div class="loading"><div class="spinner"></div><span>טוען...</span></div>
    </section>

    <!-- Table card -->
    <div class="table-card">
        <div class="table-header">
            <h2><span class="page-accent">🏠</span> רשימת הוצאות קבועות</h2>
            <div style="display:flex;align-items:center;gap:1rem">
                <span id="header-total" style="font-size:0.9rem;color:var(--text-secondary)"></span>
                <button class="btn-add-main" onclick="toggleAddPanel()">+ הוסף הוצאה</button>
            </div>
        </div>

        <!-- Inline add form -->
        <div class="add-panel" id="add-panel">
            <div class="field">
                <label for="new-category">שם ההוצאה</label>
                <input id="new-category" type="text" placeholder='למשל: ביטוח רכב' maxlength="80">
            </div>
            <div class="field">
                <label for="new-amount">סכום חודשי (₪)</label>
                <input id="new-amount" type="number" min="0" step="0.01" placeholder="0.00" style="direction:ltr">
            </div>
            <div class="panel-actions">
                <button class="btn-save-inline" onclick="saveNewExpense()">✓ שמור</button>
                <button class="btn-cancel-inline" onclick="toggleAddPanel()">ביטול</button>
            </div>
        </div>

        <div style="overflow-x:auto">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>קטגוריה</th>
                        <th>סכום חודשי</th>
                        <th>בתוקף מ-</th>
                        <th>הערות</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="expenses-tbody">
                    <tr><td colspan="5">
                        <div class="loading"><div class="spinner"></div><span>טוען...</span></div>
                    </td></tr>
                </tbody>
                <tfoot id="expenses-tfoot"></tfoot>
            </table>
        </div>
    </div>

</main>

<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script>
'use strict';

document.getElementById('current-month').textContent =
    new Date().toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });

const CATEGORY_HE = {
    rent: 'שכירות', arnona: 'ארנונה', electricity: 'חשמל',
    insurance: 'ביטוח', internet: 'אינטרנט',
    salary: 'שכר', vat: 'מע"מ', goods: 'סחורה',
};
function catLabel(cat) { return CATEGORY_HE[cat] || cat; }

let allExpenses = [];
let elecEstimate = null;

// ── Load ───────────────────────────────────────────────────────
async function loadExpenses() {
    const kpi   = document.getElementById('kpi-section');
    const tbody = document.getElementById('expenses-tbody');
    try {
        const [fixedRes, elecRes] = await Promise.all([
            fetch('/api/fixed-expenses'),
            fetch('/api/electricity/estimate'),
        ]);
        if (!fixedRes.ok) throw new Error(`HTTP ${fixedRes.status}`);
        allExpenses = await fixedRes.json();
        if (elecRes.ok) {
            const elecData = await elecRes.json();
            elecEstimate = elecData.monthly_estimate;
        }
        renderKpi(kpi, allExpenses);
        renderTable(tbody, allExpenses);
    } catch (err) {
        console.error(err);
        kpi.innerHTML   = '<p class="error-msg">שגיאה בטעינת נתונים.</p>';
        tbody.innerHTML = '<tr><td colspan="5"><p class="error-msg">שגיאה בטעינת נתונים.</p></td></tr>';
    }
}

function renderKpi(section, expenses) {
    const total = expenses.reduce((s, e) => s + e.amount, 0);
    section.innerHTML = `
        <div class="kpi-card kpi-card--fixed">
            <div class="kpi-header">
                <span class="kpi-icon">🏠</span>
                <span class="kpi-label">סה"כ הוצאות קבועות</span>
            </div>
            <span class="kpi-value fixed">${formatMoney(total)}</span>
            <span style="font-size:0.8rem;color:rgba(241,245,249,0.5)">${expenses.length} רשומות</span>
        </div>`;
}

function renderTable(tbody, expenses) {
    const elecRow = `
        <tr class="elec-row">
            <td><span class="elec-label">⚡ חשמל (משוער)</span></td>
            <td class="money" style="color:#fbbf24">
                ${elecEstimate !== null ? formatMoney(elecEstimate) : '—'}
            </td>
            <td style="color:var(--text-muted);font-size:0.8rem">אוטומטי</td>
            <td style="color:var(--text-muted);font-size:0.8rem">מחושב מחשבון אחרון</td>
            <td><a href="/electricity-history" class="btn-history">היסטוריה ←</a></td>
        </tr>`;

    if (!expenses.length) {
        tbody.innerHTML = elecRow + '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">אין הוצאות קבועות. לחץ "+ הוסף הוצאה" כדי להוסיף.</td></tr>';
        updateTotals(expenses);
        return;
    }
    tbody.innerHTML = elecRow + expenses.map(e => `
        <tr id="row-${e.id}">
            <td>${catLabel(e.category)}</td>
            <td class="money fixed" id="amount-cell-${e.id}">
                <span id="display-${e.id}">${formatMoney(e.amount)}</span>
                <input class="amount-input" id="input-${e.id}" type="number"
                    min="0" step="0.01" value="${e.amount}" style="display:none">
            </td>
            <td style="color:var(--text-secondary);font-size:0.85rem">${e.valid_from || ''}</td>
            <td style="color:var(--text-secondary);font-size:0.85rem">${e.notes || ''}</td>
            <td>
                <div class="actions-cell" id="actions-${e.id}">
                    <button class="btn-icon" onclick="startEdit(${e.id})" id="btn-edit-${e.id}" title="ערוך">✏️</button>
                    <button class="btn-save-inline" onclick="saveEdit(${e.id})" id="btn-save-${e.id}" style="display:none">✓ שמור</button>
                    <button class="btn-cancel-inline" onclick="cancelEdit(${e.id})" id="btn-cancel-${e.id}" style="display:none">✗</button>
                    <button class="btn-icon delete" onclick="deleteExpense(${e.id})" title="מחק">🗑️</button>
                    <span class="saved-flash" id="flash-${e.id}">נשמר ✓</span>
                </div>
            </td>
        </tr>`).join('');
    updateTotals(expenses);
}

function updateTotals(expenses) {
    const fixedTotal = expenses.reduce((s, e) => s + e.amount, 0);
    const elecPart   = elecEstimate !== null ? elecEstimate : 0;
    const total      = fixedTotal + elecPart;
    document.getElementById('expenses-tfoot').innerHTML = `
        <tr>
            <td>סה"כ (כולל חשמל משוער)</td>
            <td class="money" style="color:#c7d2fe">${formatMoney(total)}</td>
            <td colspan="3"></td>
        </tr>`;
    document.getElementById('header-total').textContent = `סה"כ: ${formatMoney(total)}`;
    // refresh KPI too
    const kpi = document.getElementById('kpi-section');
    if (kpi) renderKpi(kpi, expenses);
}

// ── Add panel ─────────────────────────────────────────────────
function toggleAddPanel() {
    const panel = document.getElementById('add-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
        document.getElementById('new-category').focus();
    }
}

async function saveNewExpense() {
    const catInput    = document.getElementById('new-category');
    const amountInput = document.getElementById('new-amount');
    const category    = catInput.value.trim();
    const amount      = parseFloat(amountInput.value) || 0;

    if (!category) { catInput.focus(); return; }

    try {
        const res = await fetch('/api/fixed-expenses', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ category, amount }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { id } = await res.json();

        // Add to local state and re-render
        allExpenses.push({ id, category, amount, valid_from: new Date().toISOString().slice(0,10), notes: '' });
        renderTable(document.getElementById('expenses-tbody'), allExpenses);

        // Reset and close form
        catInput.value    = '';
        amountInput.value = '';
        document.getElementById('add-panel').classList.remove('open');
    } catch (err) {
        console.error(err);
        alert('שגיאה בהוספת הוצאה.');
    }
}

// ── Delete ────────────────────────────────────────────────────
async function deleteExpense(id) {
    const exp = allExpenses.find(e => e.id === id);
    const label = catLabel(exp.category);
    if (!confirm(`למחוק את "${label}"?`)) return;

    try {
        const res = await fetch(`/api/fixed-expenses/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allExpenses = allExpenses.filter(e => e.id !== id);
        renderTable(document.getElementById('expenses-tbody'), allExpenses);
    } catch (err) {
        console.error(err);
        alert('שגיאה במחיקה.');
    }
}

// ── Inline amount edit ────────────────────────────────────────
function startEdit(id) {
    document.getElementById(`display-${id}`).style.display    = 'none';
    document.getElementById(`input-${id}`).style.display      = '';
    document.getElementById(`btn-edit-${id}`).style.display   = 'none';
    document.getElementById(`btn-save-${id}`).style.display   = '';
    document.getElementById(`btn-cancel-${id}`).style.display = '';
    document.getElementById(`input-${id}`).focus();
}

function cancelEdit(id) {
    const exp = allExpenses.find(e => e.id === id);
    document.getElementById(`input-${id}`).value               = exp.amount;
    document.getElementById(`display-${id}`).style.display     = '';
    document.getElementById(`input-${id}`).style.display       = 'none';
    document.getElementById(`btn-edit-${id}`).style.display    = '';
    document.getElementById(`btn-save-${id}`).style.display    = 'none';
    document.getElementById(`btn-cancel-${id}`).style.display  = 'none';
}

async function saveEdit(id) {
    const input  = document.getElementById(`input-${id}`);
    const amount = parseFloat(input.value);
    if (isNaN(amount) || amount < 0) { input.focus(); return; }

    try {
        const res = await fetch(`/api/fixed-expenses/${id}`, {
            method:  'PUT',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ amount }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const exp = allExpenses.find(e => e.id === id);
        exp.amount = amount;
        document.getElementById(`display-${id}`).textContent = formatMoney(amount);
        cancelEdit(id);
        updateTotals(allExpenses);
        const flash = document.getElementById(`flash-${id}`);
        flash.style.opacity = '1';
        setTimeout(() => { flash.style.opacity = '0'; }, 2000);
    } catch (err) {
        console.error(err);
        alert('שגיאה בשמירה.');
    }
}

// ── Boot ───────────────────────────────────────────────────────
loadExpenses();
</script>
</body>
</html>
