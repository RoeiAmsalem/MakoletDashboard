<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כניסה - מכולת דשבורד</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .store-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .login-header p {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid #334155;
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .form-group input {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
            font-size: 1rem;
            color: var(--text-light);
            font-family: inherit;
            direction: rtl;
            transition: border-color 0.15s;
            width: 100%;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neutral);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--neutral);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 0.5rem;
        }

        .btn-login:hover { opacity: 0.88; }

        .login-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.35);
            color: #fca5a5;
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-header">
        <span class="store-icon">🏪</span>
        <h1>מכולת דשבורד</h1>
        <p>נא להתחבר כדי להמשיך</p>
    </div>

    <div class="login-card">
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">שם משתמש</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    autofocus
                    required
                    placeholder="הכנס שם משתמש"
                >
            </div>

            <div class="form-group">
                <label for="password">סיסמה</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    placeholder="הכנס סיסמה"
                >
            </div>

            <button type="submit" class="btn-login">כניסה</button>
        </form>
    </div>
</div>

</body>
</html>
